name: Warn when ADO pipeline YAML file changes

on:
  pull_request:
    paths:
    - ".azdo/DataversePluginEvals_PR.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  warn:
    runs-on: ubuntu-latest
    steps:
      - name: Emit warning in logs
        run: |
          echo "::warning file=.azdo/DataversePluginEvals_PR.yml::This PR changes .azdo/DataversePluginEvals_PR.yml. After merge, Azure DevOps may disable/require approval for the PR pipeline YAML until it is re-enabled/approved."
          echo "ADO pipeline: DVSkillsPlugin-Evals-PR (definitionId=32010)"
          echo "https://dev.azure.com/dynamicscrm/OneCRM/_build?definitionId=32010"

      - name: Add workflow summary
        run: |
          {
            echo "## ADO PR pipeline YAML change detected"
            echo ""
            echo "**File changed:** \`.azdo/DataversePluginEvals_PR.yml\`"
            echo ""
            echo "**Why this matters:** After this is merged, Azure DevOps may disable/require approval for the PR pipeline YAML."
            echo ""
            echo "**Action required (post-merge):** Re-enable / approve the updated YAML for:"
            echo "- **DVSkillsPlugin-Evals-PR** (definitionId=32010)"
            echo "- https://dev.azure.com/dynamicscrm/OneCRM/_build?definitionId=32010"
            echo ""
            echo "Then trigger a run to confirm PR validation works."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post resolvable PR review comment (only if not already present)
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          # Hidden marker embedded in the comment body so we can recognize prior runs of this workflow.
          MARKER="<!-- ado-pipeline-yaml-pr-warning:DataversePluginEvals_PR -->"

          # Look for any existing review thread on this PR that contains the marker.
          # If at least one is still UNRESOLVED, skip posting a new one.
          # If all prior markers are RESOLVED (or none exist), post a fresh comment.
          existing=$(gh api graphql \
            -F owner="$REPO_OWNER" \
            -F name="$REPO_NAME" \
            -F number="$PR_NUMBER" \
            -f query='
              query($owner:String!,$name:String!,$number:Int!) {
                repository(owner:$owner,name:$name) {
                  pullRequest(number:$number) {
                    reviewThreads(first:100) {
                      nodes {
                        isResolved
                        comments(first:1) { nodes { body } }
                      }
                    }
                  }
                }
              }' \
            --jq ".data.repository.pullRequest.reviewThreads.nodes
                  | map(select(.comments.nodes[0].body | contains(\"$MARKER\")))
                  | map(select(.isResolved == false))
                  | length")

          if [ "${existing:-0}" -gt 0 ]; then
            echo "Found $existing unresolved warning comment(s) already on this PR — skipping."
            exit 0
          fi

          body=$'> [!WARNING]\n> **ADO PR pipeline YAML change detected**\n>\n> This PR modifies `.azdo/DataversePluginEvals_PR.yml`. After merge, Azure DevOps may disable or require approval for the PR validation pipeline.\n>\n> **Action required (post-merge):** Re-enable / approve the updated YAML for:\n> - **DVSkillsPlugin-Evals-PR** (definitionId=32010)\n> - https://dev.azure.com/dynamicscrm/OneCRM/_build?definitionId=32010\n>\n> Please resolve this comment after completing the post-merge steps.\n\n'"$MARKER"

          jq -n \
            --arg sha "$HEAD_SHA" \
            --arg body "$body" \
            '{
              path: ".azdo/DataversePluginEvals_PR.yml",
              subject_type: "file",
              commit_id: $sha,
              body: $body
            }' | \
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments \
            --input -
