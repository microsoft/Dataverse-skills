# Dataverse Skills Plugin Eval Pipeline
# Phase 2: Checkout + .NET + LocalEvalRunner install
#
# ADO: dynamicscrm/OneCRM  Pipeline ID: 32007
# Source: github.com/microsoft/Dataverse-skills (self-checkout)
# Endpoint: github.com_microsoft (1) — bb7c410e-b316-4680-b682-31d4017fef13

trigger: none
pr: none

pool:
  name: 'Azure Pipelines'
  vmImage: 'ubuntu-latest'

steps:
- checkout: self
  displayName: 'Checkout Dataverse-skills'

- task: UseDotNet@2
  inputs:
    version: '8.x'
  displayName: 'Install .NET 8'

- script: |
    echo "=== Installing LocalEvalRunner from NuGet ==="
    dotnet nuget add source \
      "https://pkgs.dev.azure.com/dynamicscrm/_packaging/XrmSolutions/nuget/v3/index.json" \
      --name XrmSolutions \
      --username "az" \
      --password "$(System.AccessToken)" \
      --store-password-in-clear-text || echo "Source may already exist"

    dotnet tool install --global localevalrunner \
      --add-source "https://pkgs.dev.azure.com/dynamicscrm/_packaging/XrmSolutions/nuget/v3/index.json" \
      --version "*"

    echo "=== Verifying install ==="
    export PATH="$PATH:$HOME/.dotnet/tools"
    localevalrunner --version || localevalrunner --help || echo "localevalrunner binary installed"
  displayName: 'Install LocalEvalRunner'
  env:
    DOTNET_SYSTEM_NET_HTTP_USESOCKETSHTTPHANDLER: 0

- script: |
    echo "=== Smoke test ==="
    echo "Build.SourcesDirectory: $(Build.SourcesDirectory)"
    echo "Build.SourceBranch:     $(Build.SourceBranch)"
    echo ""
    echo "=== Skill files ==="
    find $(Build.SourcesDirectory)/.github/plugins -name "SKILL.md" 2>/dev/null || echo "No skills found"
    echo ""
    echo "=== Eval test files ==="
    find $(Build.SourcesDirectory)/evals -name "*.biceval.json" 2>/dev/null || echo "No eval files found"
    echo ""
    export PATH="$PATH:$HOME/.dotnet/tools"
    echo "=== LocalEvalRunner installed ==="
    which localevalrunner && echo "PASS" || echo "FAIL: localevalrunner not on PATH"
  displayName: 'Smoke test — verify checkout + tools'
