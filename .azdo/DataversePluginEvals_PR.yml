#################################################################################
#        Dataverse Skills Plugin — BIC Offline Eval Pipeline                    #
#                                                                               #
# Runs BIC standard offline evaluations for the Dataverse Skills Plugin         #
# against the shared CAPI resource, using the LocalEvalRunner BIC               #
# pipeline template.                                                            #
#                                                                               #
# ADO: dynamicscrm/OneCRM  Pipeline ID: 32010                                  #
# Folder: \DV Skills Plugin                                                     #
# Source: github.com/microsoft/Dataverse-skills (self-checkout)                 #
# Template: bic/LocalEvalRunner (via bic-proxima-shared-stamp)                  #
#                                                                               #
# Prereqs (one-time, see BIC Offline Pipeline Onboarding wiki):                 #
#  - LocalEvalTool-ResourceAccess (Contributor) in CoreIdentity                 #
#  - TM-PowerAIML group membership                                              #
#  - bic-proxima-shared-stamp endpoint on dynamicscrm ADO                       #
#################################################################################

trigger: none
pr: none

variables:
  WindowsContainerImage: 'onebranch.azurecr.io/windows/ltsc2022/vse2022:latest'
  CDP_DEFINITION_BUILD_COUNT: $[counter('', 0)]

parameters:
  - name: azureServiceConnection
    displayName: 'Azure managed-identity service connection (for CAPI)'
    type: string
    default: 'LocalEvalResources-MI-ServiceConnection'

  - name: testFile
    displayName: 'Test file (relative to evals/tests/)'
    type: string
    default: 'dv_data.biceval.json'

  - name: iterations
    displayName: 'Number of iterations'
    type: number
    default: 1

  - name: concurrency
    displayName: 'Concurrent evaluations'
    type: number
    default: 1

resources:
  repositories:
  - repository: templates
    type: git
    name: OneBranch.Pipelines/GovernedTemplates
    ref: refs/heads/main
  - repository: BicEvalRunner
    type: github
    endpoint: bic-proxima-shared-stamp
    name: bic/LocalEvalRunner
    ref: refs/heads/main

extends:
  template: v2/OneBranch.NonOfficial.CrossPlat.yml@templates
  parameters:
    featureFlags:
      WindowsHostVersion:
        Version: 2022
    cloudvault:
      enabled: false
    globalSdl:
      tsa:
        enabled: false
      binskim:
        break: true
      policheck:
        break: true

    stages:
    - template: .pipelines/templates/BicEval-CI-CD-OfficialTemplate.yml@BicEvalRunner
      parameters:
        sourceRepoTestFilePath: 'evals/tests/${{ parameters.testFile }}'
        # CopilotCliAgent not yet in OfficialTemplate agentType enum.
        # Use NoneAgent + cliAgent + customExecutionScript to invoke it.
        agentType: 'NoneAgent'
        cliAgent: 'copilot'
        azureServiceConnection: ${{ parameters.azureServiceConnection }}
        concurrency: ${{ parameters.concurrency }}
        iterations: ${{ parameters.iterations }}
        serviceName: 'DataverseSkillsPlugin'
        continueOnError: false
        enableStatSig: false
        customExecutionScript: |
          $ErrorActionPreference = 'Stop'
          $testFile = '${{ parameters.testFile }}'
          $sourceTest = Join-Path "$(Build.SourcesDirectory)" "evals/tests/$testFile"
          $workDir = '${{ parameters.workingDirectory }}'
          if ([string]::IsNullOrWhiteSpace($workDir)) { $workDir = "$(Agent.TempDirectory)/eval-workspace" }

          # Copy test file to working directory
          Copy-Item $sourceTest $workDir -Force
          Set-Location $workDir

          # Create CopilotCliAgent config co-located with test
          $pluginDir = Join-Path "$(Build.SourcesDirectory)" ".github/plugins/dataverse"
          @{
            command = "copilot"
            model = "claude-sonnet-4.6"
            pluginDir = $pluginDir
            transcriptDir = "transcripts/"
            logDir = "logs/"
            logLevel = "all"
            timeoutSeconds = 600
            agentInstanceName = "Dataverse Plugin (ADO)"
            agentInstanceType = "CopilotCliAgent"
          } | ConvertTo-Json | Set-Content "copilot_agent_config.json" -Encoding UTF8

          # Run localevalrunner with CopilotCliAgent
          $runId = "dv_$(Build.BuildNumber)_$(Get-Date -Format 'yyyyMMdd_HHmmss')"
          Write-Host "##vso[task.setvariable variable=runId;isOutput=true]$runId"

          $cmd = "localevalrunner `"$testFile`" --copilotcliagent copilot_agent_config.json --output reports --concurrency ${{ parameters.concurrency }} --runid $runId --service DataverseSkillsPlugin"
          Write-Host "Running: $cmd"
          Invoke-Expression $cmd

          # Emit result variables
          $report = Get-ChildItem reports/evaluation_report_*.json -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if ($report) {
            $r = Get-Content $report -Raw | ConvertFrom-Json
            $passed = ($r.TestResults | Where-Object { $_.Passed }).Count
            $total = $r.TestResults.Count
            Write-Host "##vso[task.setvariable variable=EvalTestsPassed]$passed"
            Write-Host "##vso[task.setvariable variable=EvalTestsTotal]$total"
            Write-Host "Results: $passed/$total passed"
          }
