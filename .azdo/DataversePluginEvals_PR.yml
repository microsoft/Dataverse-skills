#################################################################################
#        Dataverse Skills Plugin — Offline Eval Pipeline                        #
#                                                                               #
# Runs offline evaluations for the Dataverse Skills Plugin using                #
# LocalEvalRunner step templates with CopilotCliAgent.                          #
#                                                                               #
# Source: github.com/microsoft/Dataverse-skills (self-checkout)                 #
# Templates: LocalEvalRunner step templates (Setup, Execute, Publish)           #
#################################################################################

trigger: none
pr: none

name: $(Date:yyyyMMdd)$(Rev:.r) • ${{ parameters.mode }} • ${{ parameters.label }} • ${{ parameters.testFile }}

pool:
  name: 'Azure Pipelines'
  vmImage: 'ubuntu-latest'

variables:
- group: DVSkillsPlugin_Secrets

parameters:
  - name: mode
    displayName: 'Eval mode'
    type: string
    default: 'dry-run'
    values: ['dry-run', 'live']

  - name: label
    displayName: 'Run label (branch or PR description)'
    type: string
    default: 'plugin-main'

  - name: azureServiceConnection
    displayName: 'Azure service connection for AI model access'
    type: string
    default: 'LocalEvalResources-MI-ServiceConnection'

  - name: testFile
    displayName: 'Test file (relative to evals/tests/)'
    type: string
    default: 'dv_data.biceval.json'

  - name: concurrency
    displayName: 'Concurrent evaluations'
    type: number
    default: 1

resources:
  repositories:
  - repository: BicEvalRunner
    type: github
    endpoint: bic-proxima-shared-stamp
    name: bic/LocalEvalRunner
    ref: refs/heads/users/sbadenkal/deterministic-assertions
  - repository: BicEvalsService
    type: github
    endpoint: bic-proxima-shared-stamp
    name: bic/BIC-Evaluations-Service
    ref: refs/heads/users/claude/dvskills-evaluators

steps:
- checkout: self
  displayName: 'Checkout Dataverse-skills'

- checkout: BicEvalsService
  displayName: 'Checkout evaluator prompts'
  fetchDepth: 1

# Set Copilot CLI auth token for all subsequent steps
- script: |
    echo "##vso[task.setvariable variable=GH_TOKEN;issecret=true]$COPILOT_GH_PAT"
    echo "##vso[task.setvariable variable=COPILOT_GITHUB_TOKEN;issecret=true]$COPILOT_GH_PAT"
    echo "Copilot auth token configured (${#COPILOT_GH_PAT} chars)"
  displayName: 'Configure Copilot CLI auth'
  env:
    COPILOT_GH_PAT: $(COPILOT_GH_PAT)

# Setup: .NET, NuGet auth, LocalEvalRunner install, Copilot CLI, init workspace
- template: .pipelines/templates/steps/BicEval-SetupTemplate.yml@BicEvalRunner
  parameters:
    cliAgent: 'copilot'

# Configure: merge replacements, prepare agent config
- template: .pipelines/templates/steps/BicEval-ConfigureTemplate.yml@BicEvalRunner
  parameters:
    agentConfigFile: ''

# Pre-execution: copy test file, evaluators, and create CopilotCliAgent config
- pwsh: |
    $sourceDir = "$(Build.SourcesDirectory)/Dataverse-skills"
    $workDir = "$(Agent.TempDirectory)/eval-workspace"
    $testFile = '${{ parameters.testFile }}'

    # Copy test file from source repo to LER workspace
    Copy-Item (Join-Path $sourceDir "evals/tests/$testFile") $workDir -Force

    # Copy evaluator prompty files from BIC-Evaluations-Service checkout
    $besDir = "$(Build.SourcesDirectory)/BIC-Evaluations-Service/src/BicEvalsService.BusinessLogic/Prompts"
    $evalDst = Join-Path $workDir "CustomEvaluators/CortexConfigurations"
    New-Item -ItemType Directory -Path $evalDst -Force | Out-Null
    if (Test-Path $besDir) {
      Copy-Item "$besDir/*" $evalDst -Recurse -Force
      Write-Host "Copied evaluators from BIC-Evaluations-Service"
      Get-ChildItem $evalDst -Recurse -Filter "*.prompty" | ForEach-Object { Write-Host "  $($_.FullName)" }
    } else {
      Write-Host "##[error]BIC-Evaluations-Service Prompts directory not found at $besDir"
      exit 1
    }

    # Create CopilotCliAgent config pointing to plugin skills
    $pluginDir = Join-Path $sourceDir ".github/plugins/dataverse"
    @{
      command = "copilot"
      model = "claude-sonnet-4.6"
      pluginDir = $pluginDir
      transcriptDir = "transcripts/"
      logDir = "logs/"
      logLevel = "all"
      timeoutSeconds = 600
      agentInstanceName = "Dataverse Plugin Eval"
      agentInstanceType = "CopilotCliAgent"
    } | ConvertTo-Json | Set-Content (Join-Path $workDir "copilot_agent_config.json") -Encoding UTF8

    # Override evaluator model to use Claude Opus as judge (keeps existing CAPI endpoint from LER config)
    $appSettings = Join-Path $workDir "appsettings.json"
    if (Test-Path $appSettings) {
      $cfg = Get-Content $appSettings -Raw | ConvertFrom-Json
      foreach ($m in $cfg.EvaluatorSettings.Models) {
        if ($m.ModelProvider -eq 'CAPI') { $m.ModelName = 'claude-opus-4-6' }
      }
      $cfg | ConvertTo-Json -Depth 10 | Set-Content $appSettings -Encoding UTF8
      Write-Host "Judge model set to claude-opus-4-6 on CAPI entries"
    }
  displayName: 'Prepare test file and agent config'

# Execute: run localevalrunner with CopilotCliAgent
- template: .pipelines/templates/steps/BicEval-ExecuteTemplate.yml@BicEvalRunner
  parameters:
    sourceRepoTestFilePath: 'evals/tests/${{ parameters.testFile }}'
    agentType: 'CopilotCliAgent'
    agentConfigFile: 'copilot_agent_config.json'
    azureServiceConnection: ${{ parameters.azureServiceConnection }}
    concurrency: ${{ parameters.concurrency }}
    serviceName: 'DataverseSkillsPlugin'

# Publish: test results + artifacts
- template: .pipelines/templates/steps/BicEval-PublishTemplate.yml@BicEvalRunner
