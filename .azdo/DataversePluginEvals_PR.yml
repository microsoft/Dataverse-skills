# Dataverse Skills Plugin Eval Pipeline
# Phase 2b: Checkout + .NET + NuGetAuthenticate + LocalEvalRunner install
#
# ADO: dynamicscrm/OneCRM  Pipeline ID: 32007
# Source: github.com/microsoft/Dataverse-skills (self-checkout)
# Endpoint: github.com_microsoft (1) — bb7c410e-b316-4680-b682-31d4017fef13

trigger: none
pr: none

pool:
  name: 'Azure Pipelines'
  vmImage: 'ubuntu-latest'

steps:
- checkout: self
  displayName: 'Checkout Dataverse-skills'

- task: UseDotNet@2
  inputs:
    version: '8.x'
  displayName: 'Install .NET 8'

- task: NuGetAuthenticate@1
  displayName: 'Authenticate with Azure Artifacts'

- pwsh: |
    dotnet tool install --global LocalEvalRunner `
      --add-source "https://pkgs.dev.azure.com/dynamicscrm/_packaging/XrmSolutions/nuget/v3/index.json" `
      --ignore-failed-sources

    # Verify installation
    localevalrunner --help | Select-Object -First 5
  displayName: 'Install LocalEvalRunner from feed'

- script: |
    echo "=== Smoke test ==="
    echo "Build.SourceBranch: $(Build.SourceBranch)"
    echo ""
    echo "=== Skill files ==="
    find $(Build.SourcesDirectory)/.github/plugins -name "SKILL.md" 2>/dev/null
    echo ""
    echo "=== Eval test files ==="
    find $(Build.SourcesDirectory)/evals -name "*.biceval.json" 2>/dev/null
    echo ""
    export PATH="$PATH:$HOME/.dotnet/tools"
    echo "=== LocalEvalRunner ==="
    which localevalrunner && localevalrunner --help | head -3 && echo "PASS" || echo "FAIL"
  displayName: 'Smoke test — verify checkout + tools'
