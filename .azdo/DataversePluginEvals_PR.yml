# Dataverse Skills Plugin Eval Pipeline
# Runs LocalEvalRunner with CopilotCliAgent against the plugin skills.
#
# Source: microsoft/Dataverse-skills (self-checkout)
# Tests: evals/tests/*.biceval.json
# Evaluators: CortexConfigurations:Common/DVSkillsPlugin/*.prompty
#
# Installs localevalrunner from NuGet. Self-contained YAML.
# Uses OneBranch NonOfficial CrossPlat template for ExtendsCheck compliance.

trigger: none
pr: none

parameters:
- name: testFile
  displayName: "Test file"
  type: string
  default: "dv_data.biceval.json"

- name: azureServiceConnection
  displayName: "Azure service connection"
  type: string
  default: "LocalEvalResources-MI-ServiceConnection-OneAgile"

resources:
  repositories:
  - repository: templates
    type: git
    name: OneBranch.Pipelines/GovernedTemplates
    ref: refs/heads/main

extends:
  template: v2/OneBranch.NonOfficial.CrossPlat.yml@templates
  parameters:
    globalSdl:
      tsa:
        enabled: false
    stages:
    - stage: Evaluate
      displayName: 'Evaluate Plugin Skills'
      jobs:
      - job: RunEvals
        displayName: 'Run ${{ parameters.testFile }}'
        pool:
          name: Azure-Pipelines-1ESPT-ExDShared
          image: ubuntu-latest
          os: linux
        timeoutInMinutes: 30
        variables:
        - group: CopilotCliTest_Secrets
        steps:

        # 1. Checkout self (microsoft/Dataverse-skills)
        - checkout: self

        # 2. Install .NET
        - task: UseDotNet@2
          inputs:
            version: '8.x'
          displayName: 'Install .NET 8'

        # 3. Install localevalrunner from NuGet
        - task: AzureCLI@2
          inputs:
            azureSubscription: ${{ parameters.azureServiceConnection }}
            scriptType: 'pscore'
            scriptLocation: 'inlineScript'
            addSpnToEnvironment: true
            inlineScript: |
              dotnet tool install --global localevalrunner `
                --add-source "https://pkgs.dev.azure.com/dynamicscrm/_packaging/XrmSolutions/nuget/v3/index.json" `
                --version "*"
              Write-Host "Installed localevalrunner"
          displayName: 'Install LocalEvalRunner'

        # 4. Install Copilot CLI
        - script: |
            npm install -g copilot-cli || echo "Copilot CLI install attempt completed"
            which copilot || echo "copilot not in PATH yet"
          displayName: 'Install Copilot CLI'
          env:
            GH_TOKEN: $(COPILOT_GH_PAT)

        # 5. Set up workspace and run eval
        - task: AzureCLI@2
          inputs:
            azureSubscription: ${{ parameters.azureServiceConnection }}
            scriptType: 'pscore'
            scriptLocation: 'inlineScript'
            addSpnToEnvironment: true
            inlineScript: |
              $workspace = "$(Agent.TempDirectory)/eval-workspace"
              New-Item -ItemType Directory -Path $workspace -Force | Out-Null
              Set-Location $workspace

              # Init LER workspace
              localevalrunner init

              # Copy test files from self-checkout
              $repoRoot = "$(Build.SourcesDirectory)"
              $testSrc = Join-Path $repoRoot "evals/tests"
              if (Test-Path $testSrc) {
                Copy-Item "$testSrc/*" . -Recurse -Force
                Write-Host "Test files copied:"
                Get-ChildItem *.biceval.json
              } else {
                Write-Error "Test files not found at $testSrc"
                exit 1
              }

              # Create agent config
              $pluginDir = Join-Path $repoRoot ".github/plugins/dataverse"
              @{
                command = "copilot"
                model = "claude-sonnet-4.6"
                pluginDir = $pluginDir
                transcriptDir = "transcripts/"
                logDir = "logs/"
                logLevel = "all"
                timeoutSeconds = 600
                agentInstanceName = "Dataverse Plugin (ADO eval)"
                agentInstanceType = "CopilotCliAgent"
              } | ConvertTo-Json | Set-Content "agent_config.json" -Encoding UTF8

              # Run evaluation
              $runId = "dv_$(Build.BuildNumber)_$(Get-Date -Format 'yyyyMMdd_HHmmss')"
              $testFile = "${{ parameters.testFile }}"

              Write-Host "Running: localevalrunner $testFile --copilotcliagent agent_config.json"
              localevalrunner $testFile `
                --copilotcliagent agent_config.json `
                --output reports `
                --concurrency 1 `
                --runid $runId `
                --service DataverseSkillsPlugin
          displayName: 'Run eval'
          env:
            GH_TOKEN: $(COPILOT_GH_PAT)
            COPILOT_GH_PAT: $(COPILOT_GH_PAT)

        # 6. Publish results
        - task: PublishTestResults@2
          condition: succeededOrFailed()
          inputs:
            testResultsFiles: '$(Agent.TempDirectory)/eval-workspace/reports/*.trx'
            testRunTitle: 'Dataverse Plugin Eval'
          displayName: 'Publish test results'

        - task: PublishBuildArtifacts@1
          condition: succeededOrFailed()
          inputs:
            pathToPublish: '$(Agent.TempDirectory)/eval-workspace/reports'
            artifactName: 'EvalReports'
          displayName: 'Publish eval reports'
