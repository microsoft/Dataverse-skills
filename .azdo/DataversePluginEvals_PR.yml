# Dataverse Skills Plugin Eval Pipeline
# Phase 1: Minimal pipeline proving github.com checkout + basic execution
#
# ADO: dynamicscrm/OneCRM  Pipeline ID: 32006
# Source: github.com/microsoft/Dataverse-skills (self-checkout)
# Endpoint: github.com_microsoft (1) — bb7c410e-b316-4680-b682-31d4017fef13

trigger: none
pr: none

pool:
  vmImage: 'ubuntu-latest'

steps:
- checkout: self
  displayName: 'Checkout Dataverse-skills'

- script: |
    echo "=== Pipeline smoke test ==="
    echo "Build.SourcesDirectory: $(Build.SourcesDirectory)"
    echo "Build.BuildNumber:      $(Build.BuildNumber)"
    echo "Build.SourceBranch:     $(Build.SourceBranch)"
    echo ""
    echo "=== Repo contents ==="
    ls -la $(Build.SourcesDirectory)
    echo ""
    echo "=== Skill files ==="
    find $(Build.SourcesDirectory)/.github/plugins -name "SKILL.md" 2>/dev/null || echo "No skills found"
    echo ""
    echo "=== Eval test files ==="
    find $(Build.SourcesDirectory)/evals -name "*.biceval.json" 2>/dev/null || echo "No eval files found"
    echo ""
    echo "=== SUCCESS: Pipeline can checkout and execute ==="
  displayName: 'Smoke test — verify checkout'
